map $http_upgrade $devlyn_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name central.devlyn.me;

    ssl_certificate /etc/letsencrypt/live/central.devlyn.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/central.devlyn.me/privkey.pem;

    client_max_body_size 100m;

    location = / {
        return 302 /web/login;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $devlyn_connection_upgrade;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        proxy_pass http://127.0.0.1:8069;
    }
}

server {
    listen 443 ssl http2;
    server_name puc.devlyn.me;

    ssl_certificate /etc/letsencrypt/live/puc.devlyn.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/puc.devlyn.me/privkey.pem;

    client_max_body_size 100m;

    location = / {
        return 302 /helpdesk;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $devlyn_connection_upgrade;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        proxy_pass http://127.0.0.1:8069;
    }
}
