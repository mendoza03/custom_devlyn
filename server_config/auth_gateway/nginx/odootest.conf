map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name auth.odootest.mvpstart.click;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 80;
    server_name erp.odootest.mvpstart.click;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name auth.odootest.mvpstart.click;

    ssl_certificate /etc/letsencrypt/live/auth.odootest.mvpstart.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.odootest.mvpstart.click/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:8080;
    }
}

server {
    listen 443 ssl http2;
    server_name erp.odootest.mvpstart.click;

    ssl_certificate /etc/letsencrypt/live/erp.odootest.mvpstart.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.odootest.mvpstart.click/privkey.pem;

    client_max_body_size 100m;

    # Emergency admin login with IP allowlist only
    location = /__admin_login__ {
        allow 187.221.16.114;
        allow 201.121.57.182;
        deny all;

        proxy_set_header Host $host;
        proxy_set_header X-Biometric-Admin-Bypass 1;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8069/web/login?biometric_admin=1;
    }

    # Emergency admin logout bypass (IP allowlist only)
    # NOTE: keep this allowlist aligned with /__admin_login__.
    location = /__admin_logout__ {
        allow 187.221.16.114;
        allow 201.121.57.182;
        deny all;

        proxy_set_header Host $host;
        proxy_set_header X-Biometric-Admin-Bypass 1;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Force biometric bypass and send back to normal Odoo login (admin bypass).
        proxy_pass http://127.0.0.1:8069/web/session/logout?biometric_final=1&redirect=%2F__admin_login__;
    }

    # Let Odoo decide the login mode; avoid any residual proxy-level redirects.
    location = /web/login {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        proxy_pass http://127.0.0.1:8069;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;
        proxy_pass http://127.0.0.1:8069;
    }
}
