server {
    listen 443 ssl http2;
    server_name mcp.odootest.mvpstart.click;

    ssl_certificate /etc/letsencrypt/live/mcp.odootest.mvpstart.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.odootest.mvpstart.click/privkey.pem;

    access_log /var/log/nginx/odoo_mcp_access.log;
    error_log /var/log/nginx/odoo_mcp_error.log warn;

    client_max_body_size 2m;

    location = /mcp/ {
        return 308 https://$host/mcp;
    }

    location = /mcp {
        limit_except GET POST { deny all; }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header MCP-Protocol-Version $http_mcp_protocol_version;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_pass http://127.0.0.1:8071;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8071;
    }
}
