log_format biometric_ingest
    '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
    'rt=$request_time urt=$upstream_response_time ua="$http_user_agent"';

limit_req_zone $binary_remote_addr zone=biometric_ingest_per_ip:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=biometric_ingest_conn_per_ip:10m;

server {
    listen 60005 default_server reuseport;
    server_name _;

    access_log /var/log/nginx/biometric_ingest_access.log biometric_ingest;
    error_log /var/log/nginx/biometric_ingest_error.log warn;

    client_max_body_size 128k;
    keepalive_timeout 10s;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    location = /__health {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Listener-Port 60005;
        proxy_pass http://127.0.0.1:60006/__health;
    }

    location / {
        if ($request_method != POST) {
            return 405;
        }

        limit_req zone=biometric_ingest_per_ip burst=120 nodelay;
        limit_conn biometric_ingest_conn_per_ip 40;

        proxy_http_version 1.1;
        proxy_request_buffering on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Listener-Port 60005;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_pass http://127.0.0.1:60006;
    }
}
